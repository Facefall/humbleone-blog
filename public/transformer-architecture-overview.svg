<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Transformer 架构全景图（Decoder-only / GPT）</title>
  <desc id="desc">一张从输入文本、Tokenizer、Embedding、Transformer Block、LM Head 到 Decoding 输出文本的中文架构全景图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#233143"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2277b7"/>
    </marker>
    <style>
      .bg { fill: #fbfcfd; }
      .title { font: 800 54px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #18202b; letter-spacing: 0; }
      .subtitle { font: 500 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #536170; letter-spacing: 0; }
      .section-title { font: 800 28px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #18202b; letter-spacing: 0; }
      .h2 { font: 800 25px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #1e2b39; letter-spacing: 0; }
      .h3 { font: 700 21px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #1e2b39; letter-spacing: 0; }
      .body { font: 500 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #364352; letter-spacing: 0; }
      .small { font: 500 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #536170; letter-spacing: 0; }
      .tiny { font: 600 13px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #536170; letter-spacing: 0; }
      .mono { font: 700 16px Consolas, "Microsoft YaHei", monospace; fill: #364352; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #d5dde6; stroke-width: 2; rx: 8; }
      .soft-panel { fill: #f5f8fb; stroke: #d5dde6; stroke-width: 2; rx: 8; }
      .stage-blue { fill: #dff2ff; stroke: #2277b7; stroke-width: 2.4; rx: 8; }
      .stage-teal { fill: #dff9f0; stroke: #15916f; stroke-width: 2.4; rx: 8; }
      .stage-orange { fill: #fff0da; stroke: #d97a1c; stroke-width: 2.4; rx: 8; }
      .stage-purple { fill: #f0e8ff; stroke: #7757c7; stroke-width: 2.4; rx: 8; }
      .stage-green { fill: #e7f8d8; stroke: #669a20; stroke-width: 2.4; rx: 8; }
      .stage-red { fill: #ffe7e7; stroke: #c24a4a; stroke-width: 2.4; rx: 8; }
      .chip { fill: #f3f6fa; stroke: #c9d4df; stroke-width: 1.6; rx: 8; }
      .arrow { stroke: #233143; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2277b7; stroke-width: 2.4; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke-dasharray: 8 8; }
      .residual { stroke: #647589; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #c2cbd6; stroke-width: 1.8; fill: none; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>

  <text class="title" x="960" y="78" text-anchor="middle">Transformer 架构全景图（Decoder-only / GPT）</text>
  <text class="subtitle" x="960" y="116" text-anchor="middle">从文本到 token 概率，再通过自回归 Decoding 循环生成输出</text>

  <g id="pipeline">
    <rect class="stage-blue" x="70" y="155" width="190" height="96"/>
    <text class="h3" x="165" y="194" text-anchor="middle">输入文本</text>
    <text class="small" x="165" y="224" text-anchor="middle">如：“你是谁”</text>

    <path class="arrow" d="M 260 203 L 312 203"/>

    <rect class="stage-orange" x="312" y="155" width="230" height="96"/>
    <text class="h3" x="427" y="192" text-anchor="middle">Tokenizer / Encoding</text>
    <text class="small" x="427" y="224" text-anchor="middle">文本 → token id</text>

    <path class="arrow" d="M 542 203 L 594 203"/>

    <rect class="stage-teal" x="594" y="155" width="250" height="96"/>
    <text class="h3" x="719" y="192" text-anchor="middle">Embedding</text>
    <text class="small" x="719" y="224" text-anchor="middle">Token + Position</text>

    <path class="arrow" d="M 844 203 L 896 203"/>

    <rect class="stage-purple" x="896" y="155" width="300" height="96"/>
    <text class="h3" x="1046" y="192" text-anchor="middle">Transformer Block × N</text>
    <text class="small" x="1046" y="224" text-anchor="middle">Masked MHA + FFN</text>

    <path class="arrow" d="M 1196 203 L 1248 203"/>

    <rect class="stage-green" x="1248" y="155" width="230" height="96"/>
    <text class="h3" x="1363" y="192" text-anchor="middle">LM Head</text>
    <text class="small" x="1363" y="224" text-anchor="middle">Linear + Softmax</text>

    <path class="arrow" d="M 1478 203 L 1530 203"/>

    <rect class="stage-red" x="1530" y="155" width="320" height="96"/>
    <text class="h3" x="1690" y="192" text-anchor="middle">Decoding / 输出文本</text>
    <text class="small" x="1690" y="224" text-anchor="middle">选择下一个 token，循环生成</text>
  </g>

  <g id="left-panel">
    <rect class="panel" x="70" y="305" width="465" height="600"/>
    <text class="section-title" x="100" y="352">1. 前处理：把文本变成向量序列</text>

    <rect class="soft-panel" x="110" y="388" width="170" height="70"/>
    <text class="h3" x="195" y="417" text-anchor="middle">输入文本</text>
    <text class="small" x="195" y="443" text-anchor="middle">“你是谁”</text>

    <path class="arrow" d="M 280 423 L 332 423"/>

    <rect class="stage-orange" x="332" y="388" width="155" height="70"/>
    <text class="h3" x="409.5" y="417" text-anchor="middle">Tokenizer</text>
    <text class="small" x="409.5" y="443" text-anchor="middle">切分 + 编号</text>

    <rect class="chip" x="112" y="500" width="375" height="74"/>
    <text class="h3" x="135" y="531">token ids</text>
    <text class="mono" x="135" y="558">[100, 120, 311, ...]</text>

    <path class="arrow" d="M 300 574 L 300 626"/>

    <rect class="stage-teal" x="112" y="626" width="375" height="88"/>
    <text class="h3" x="300" y="660" text-anchor="middle">Token Embedding</text>
    <text class="small" x="300" y="689" text-anchor="middle">id → 稠密向量</text>

    <path class="arrow" d="M 300 714 L 300 766"/>

    <rect class="stage-blue" x="112" y="766" width="375" height="88"/>
    <text class="h3" x="300" y="800" text-anchor="middle">Position Encoding / Embedding</text>
    <text class="small" x="300" y="829" text-anchor="middle">加入顺序和位置信息</text>

    <text class="small" x="100" y="885">注意：Tokenizer 是前处理，不是 Transformer 网络层。</text>
  </g>

  <g id="block-panel">
    <rect class="panel" x="575" y="305" width="760" height="600"/>
    <text class="section-title" x="605" y="352">2. 核心：Transformer Block 重复 N 层</text>

    <rect class="soft-panel" x="628" y="388" width="650" height="500"/>
    <text class="h2" x="953" y="426" text-anchor="middle">一个 Decoder-only Block 的内部结构</text>

    <rect class="chip" x="720" y="456" width="180" height="56"/>
    <text class="h3" x="810" y="491" text-anchor="middle">输入隐藏状态 X</text>

    <path class="arrow" d="M 900 484 L 946 484"/>
    <rect class="stage-blue" x="946" y="456" width="160" height="56"/>
    <text class="h3" x="1026" y="491" text-anchor="middle">LayerNorm</text>

    <path class="arrow" d="M 1026 512 L 1026 552"/>
    <rect class="stage-purple" x="858" y="552" width="336" height="112"/>
    <text class="h3" x="1026" y="588" text-anchor="middle">Masked Multi-Head Attention</text>
    <text class="small" x="1026" y="618" text-anchor="middle">Q / K / V → Mask → Softmax → 加权求和</text>
    <g>
      <rect class="chip" x="900" y="626" width="44" height="28"/>
      <text class="tiny" x="922" y="645" text-anchor="middle">Q</text>
      <rect class="chip" x="958" y="626" width="44" height="28"/>
      <text class="tiny" x="980" y="645" text-anchor="middle">K</text>
      <rect class="chip" x="1016" y="626" width="44" height="28"/>
      <text class="tiny" x="1038" y="645" text-anchor="middle">V</text>
      <rect class="chip" x="1074" y="626" width="82" height="28"/>
      <text class="tiny" x="1115" y="645" text-anchor="middle">Softmax</text>
    </g>

    <path class="residual" d="M 810 512 C 690 582, 690 662, 856 710"/>
    <circle cx="880" cy="710" r="18" fill="#ffffff" stroke="#233143" stroke-width="2"/>
    <path d="M 869 710 L 891 710 M 880 699 L 880 721" stroke="#233143" stroke-width="2"/>
    <text class="small" x="702" y="620">Residual</text>
    <text class="small" x="702" y="646">残差连接</text>

    <path class="arrow" d="M 1026 664 L 1026 710 L 898 710"/>
    <rect class="chip" x="1108" y="692" width="92" height="36"/>
    <text class="tiny" x="1154" y="715" text-anchor="middle">Dropout*</text>

    <path class="arrow" d="M 898 710 L 946 710"/>
    <rect class="stage-blue" x="946" y="682" width="160" height="56"/>
    <text class="h3" x="1026" y="717" text-anchor="middle">LayerNorm</text>

    <path class="arrow" d="M 1026 738 L 1026 778"/>
    <rect class="stage-teal" x="858" y="778" width="336" height="72"/>
    <text class="h3" x="1026" y="809" text-anchor="middle">Feed Forward Network (FFN)</text>
    <text class="small" x="1026" y="835" text-anchor="middle">Linear → 激活函数 → Linear</text>

    <path class="residual" d="M 880 728 C 724 770, 704 858, 856 878"/>
    <circle cx="880" cy="878" r="18" fill="#ffffff" stroke="#233143" stroke-width="2"/>
    <path d="M 869 878 L 891 878 M 880 867 L 880 889" stroke="#233143" stroke-width="2"/>
    <text class="small" x="702" y="805">Residual</text>
    <text class="small" x="702" y="831">残差连接</text>

    <path class="arrow" d="M 1026 850 L 1026 878 L 898 878"/>
    <rect class="chip" x="1204" y="788" width="92" height="36"/>
    <text class="tiny" x="1250" y="811" text-anchor="middle">Dropout*</text>

    <path class="arrow" d="M 898 878 L 1188 878"/>
    <rect class="chip" x="1198" y="850" width="100" height="56"/>
    <text class="small" x="1248" y="873" text-anchor="middle">输出到</text>
    <text class="small" x="1248" y="895" text-anchor="middle">下一层</text>

  </g>

  <g id="right-panel">
    <rect class="panel" x="1375" y="305" width="475" height="600"/>
    <text class="section-title" x="1405" y="352">3. 输出：映射成概率并生成</text>

    <rect class="chip" x="1490" y="392" width="250" height="62"/>
    <text class="h3" x="1615" y="429" text-anchor="middle">最后一层隐藏状态</text>

    <path class="arrow" d="M 1615 454 L 1615 500"/>

    <rect class="stage-green" x="1480" y="500" width="270" height="78"/>
    <text class="h3" x="1615" y="532" text-anchor="middle">Linear 词表映射</text>
    <text class="small" x="1615" y="558" text-anchor="middle">hidden → vocab logits</text>

    <path class="arrow" d="M 1615 578 L 1615 624"/>

    <rect class="stage-orange" x="1480" y="624" width="270" height="78"/>
    <text class="h3" x="1615" y="656" text-anchor="middle">Softmax 概率分布</text>
    <text class="small" x="1615" y="682" text-anchor="middle">每个 token 的概率</text>

    <path class="arrow" d="M 1615 702 L 1615 724"/>

    <rect class="stage-red" x="1480" y="724" width="270" height="78"/>
    <text class="h3" x="1615" y="756" text-anchor="middle">Decoding / 采样</text>
    <text class="small" x="1615" y="782" text-anchor="middle">贪心、Top-k、Top-p 等</text>

    <path class="arrow" d="M 1615 802 L 1615 830"/>
    <rect class="soft-panel" x="1480" y="830" width="270" height="62"/>
    <text class="h3" x="1615" y="868" text-anchor="middle">输出文本</text>

    <path class="arrow-blue dash" d="M 1480 763 C 1395 763, 1395 455, 1488 423"/>
    <text class="small" x="1398" y="596" transform="rotate(-90 1398 596)">新 token 接回上下文，循环预测</text>
  </g>

  <g id="notes">
    <rect class="soft-panel" x="70" y="918" width="1780" height="90"/>
    <text class="section-title" x="100" y="958">层级关系速记</text>
    <text class="body" x="315" y="958">Tokenizer 是前处理；Embedding 才进入网络。</text>
    <text class="body" x="915" y="958">Softmax 有两处：Attention 权重、最终 token 概率。</text>
    <text class="body" x="315" y="995">LayerNorm / Residual / Dropout 属于 Block 内部训练稳定机制。</text>
    <text class="body" x="915" y="995">FFN = Feed Forward Network，不是 Fast Forward。</text>
  </g>
</svg>
